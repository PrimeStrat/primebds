name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Clang 18
        env:
          LLVM_VERSION: 18
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q lsb-release wget software-properties-common gnupg
          sudo wget https://apt.llvm.org/llvm.sh
          sudo chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}
          sudo apt-get install -y -q libc++-${LLVM_VERSION}-dev libc++abi-${LLVM_VERSION}-dev
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-${LLVM_VERSION} 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-${LLVM_VERSION} 100

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build/linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: primebds-linux
          path: build/linux/output/

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_64

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S . -B build/windows -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: primebds-windows
          path: build/windows/output/
